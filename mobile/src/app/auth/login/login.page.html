<ion-content class="ion-padding login-content">
  <div class="logo-area">
    <div class="logo-icon">✂</div>
    <h1>Lalo Segovia</h1>
    <p>Peluquería</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="login()">
    <ion-item>
      <ion-input
        label="Email"
        labelPlacement="floating"
        type="email"
        formControlName="email"
        autocomplete="email"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Contraseña"
        labelPlacement="floating"
        type="password"
        formControlName="password"
        autocomplete="current-password"
      ></ion-input>
    </ion-item>

    @if (error()) {
      <ion-note color="danger" class="error-note">{{ error() }}</ion-note>
    }

    <ion-button
      expand="block"
      type="submit"
      [disabled]="form.invalid || loading()"
      class="submit-btn"
    >
      @if (loading()) {
        <ion-spinner name="crescent"></ion-spinner>
      } @else {
        Iniciar sesión
      }
    </ion-button>
  </form>

  <p class="register-link">
    ¿No tienes cuenta?
    <a routerLink="/auth/register">Regístrate</a>
  </p>
</ion-content>
