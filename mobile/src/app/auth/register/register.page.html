<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/login" text="Volver"></ion-back-button>
    </ion-buttons>
    <ion-title>Crear cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="register()">
    <ion-item>
      <ion-input
        label="Nombre completo"
        labelPlacement="floating"
        type="text"
        formControlName="nombre"
        autocomplete="name"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Email"
        labelPlacement="floating"
        type="email"
        formControlName="email"
        autocomplete="email"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Teléfono (opcional)"
        labelPlacement="floating"
        type="tel"
        formControlName="telefono"
        autocomplete="tel"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Contraseña (mín. 6 caracteres)"
        labelPlacement="floating"
        type="password"
        formControlName="password"
        autocomplete="new-password"
      >
        <ion-input-password-toggle slot="end"></ion-input-password-toggle>
      </ion-input>
    </ion-item>

    @if (error()) {
      <ion-note color="danger" class="error-note">{{ error() }}</ion-note>
    }

    <ion-button
      expand="block"
      type="submit"
      [disabled]="form.invalid || loading()"
      class="submit-btn"
    >
      @if (loading()) {
        <ion-spinner name="crescent"></ion-spinner>
      } @else {
        Crear cuenta
      }
    </ion-button>
  </form>

  <p class="login-link">
    ¿Ya tienes cuenta?
    <a routerLink="/auth/login">Inicia sesión</a>
  </p>
</ion-content>
